services:
  db:
    image: mysql:8.0
    container_name: stackoverflow_db
    env_file:
      - ../.env
    ports:
      - "${DATABASE_EXTERNAL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  migrations:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrations
    container_name: stackoverflow_migrations
    env_file:
      - ../.env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: stackoverflow_backend
    env_file:
      - ../.env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 3306
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks:
      - backend

volumes:
  mysql_data:

networks:
  backend:
    driver: bridge
